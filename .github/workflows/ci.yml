name: CI

on:
  push:
    branches: ["main", "refactor/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & format (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests tools
      - name: ruff format check
        run: ruff format --check src tests tools

  typecheck:
    name: mypy (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy src

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Qt system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 \
            libdbus-1-3
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest \
            --cov=gazecontrol \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: pip-audit (dependency CVEs)
        run: |
          pip freeze --exclude-editable > /tmp/frozen-deps.txt
          pip-audit --strict --requirement /tmp/frozen-deps.txt
      - name: bandit (source security scan, MEDIUM+)
        run: bandit -r src/gazecontrol --severity-level medium -q

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Generate SBOM
        run: cyclonedx-py environment --output-format JSON --output-file sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tools
        run: pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
