name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # PyPI Trusted Publishing
  attestations: write

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tools
        run: pip install build twine
      - name: Build wheel + sdist
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  sign:
    name: Sign with Sigstore
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: dist/*

  publish-testpypi:
    name: Publish to TestPyPI (rc tags only)
    if: contains(github.ref, '-rc')
    needs: sign
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gazecontrol
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: ${{ !contains(github.ref, '-rc') }}
    needs: sign
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gazecontrol
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
